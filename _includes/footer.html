<footer class="site-footer">
  <div class="site-footer__inner">
    {% include site-social.html %}
    <p class="site-footer__meta">
      {% if site.author %}{{ site.author }} · {% endif %}{{ site.time | date: '%Y' }}
      {% if site.url-pretty %}
        · <a href="{% if site.url-canonical %}{{ site.url-canonical }}{% else %}{{ '' | absolute_url }}{% endif %}">{{ site.url-pretty }}</a>
      {% endif %}
    </p>
    <p class="site-footer__meta">Built with <a href="https://jekyllrb.com/">Jekyll</a></p>
  </div>
</footer>
